<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" role="img" aria-labelledby="nciTitle">
  <title id="nciTitle">New Century Imports — Quality . Value . Satisfaction</title>
  <defs>
    <style>
      .n-red    { fill: #D81E1E; font-family: 'Fraunces', Georgia, serif; font-weight: 700; font-style: italic; }
      .n-green  { fill: #0F6B3B; font-family: 'Inter', sans-serif; font-weight: 800; letter-spacing: 0.06em; }
      .n-tag    { fill: #1A1410; font-family: 'Inter', sans-serif; font-weight: 600; letter-spacing: 0.32em; }
      .n-cart   { fill: none; stroke: #0F6B3B; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .n-wheel  { fill: #1A1410; }
      .n-swoosh { fill: none; stroke: #0F6B3B; stroke-width: 5; stroke-linecap: round; }
    </style>
  </defs>

  <g transform="translate(252 4)">
    <path class="n-cart" d="M2 6 h10 l4 36 h40 l4 -22 h-46" />
    <path class="n-cart" d="M14 16 h44" />
    <circle class="n-wheel" cx="22" cy="50" r="3.2"/>
    <circle class="n-wheel" cx="50" cy="50" r="3.2"/>
  </g>

  <text class="n-red"   x="32"  y="100" font-size="58">New Century</text>
  <text class="n-green" x="356" y="100" font-size="44">IMPORTS</text>

  <path class="n-swoosh" d="M40 108 q60 14 230 4" />

  <text class="n-tag" x="120" y="138" font-size="11">QUALITY  ·  VALUE  ·  SATISFACTION</text>
</svg>
