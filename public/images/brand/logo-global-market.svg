<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">Global Market — Quality . Value . Satisfaction</title>
  <defs>
    <style>
      .gm-red    { fill: #D81E1E; font-family: 'Fraunces', Georgia, serif; font-weight: 700; font-style: italic; }
      .gm-green  { fill: #0F6B3B; font-family: 'Inter', sans-serif; font-weight: 800; letter-spacing: 0.04em; }
      .gm-tag    { fill: #1A1410; font-family: 'Inter', sans-serif; font-weight: 600; letter-spacing: 0.32em; }
      .gm-cart   { fill: none; stroke: #0F6B3B; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .gm-cart-wheel { fill: #1A1410; }
      .gm-swoosh { fill: none; stroke: #0F6B3B; stroke-width: 5; stroke-linecap: round; }
    </style>
  </defs>

  <!-- Shopping cart icon, top-centered -->
  <g transform="translate(232 4)">
    <path class="gm-cart" d="M2 6 h10 l4 36 h40 l4 -22 h-46" />
    <path class="gm-cart" d="M14 16 h44" />
    <circle class="gm-cart-wheel" cx="22" cy="50" r="3.2"/>
    <circle class="gm-cart-wheel" cx="50" cy="50" r="3.2"/>
  </g>

  <!-- "Global" (red, italic serif) + "MARKET" (green, bold sans) -->
  <text class="gm-red"   x="44"  y="92" font-size="58">Global</text>
  <text class="gm-green" x="234" y="92" font-size="50">MARKET</text>

  <!-- decorative green swoosh under the "G" -->
  <path class="gm-swoosh" d="M48 100 q40 14 130 4" />

  <!-- tagline -->
  <text class="gm-tag" x="100" y="124" font-size="11">QUALITY  ·  VALUE  ·  SATISFACTION</text>
</svg>
